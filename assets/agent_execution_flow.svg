<svg width="960" height="780" viewBox="0 0 960 780" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="960" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="bold">Flight Monitor — 에이전트 실행 흐름</text>
  <text x="480" y="55" text-anchor="middle" fill="#64748b" font-size="10">1 그래프 실행 = 1 모니터링 사이클  ·  반복 루프는 run.py 에서 제어</text>

  <!-- Defs -->
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="a-g" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="a-r" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="a-y" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="a-p" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#ec4899"/>
    </marker>
  </defs>

  <!-- ── Monitoring Loop outer border ────────────────────────────────────────── -->
  <rect x="16" y="66" width="928" height="632" rx="14" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="40" y="86" fill="#94a3b8" font-size="10" font-weight="bold">MONITORING LOOP (run.py)  — booking_confirmed 또는 max_checks 에 도달할 때까지 반복</text>

  <!-- ── START ──────────────────────────────────────────────────────────────── -->
  <circle cx="480" cy="116" r="28" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="480" y="112" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="bold">START</text>
  <text x="480" y="127" text-anchor="middle" fill="#94a3b8" font-size="9">check N</text>

  <!-- Arrow START → Search -->
  <line x1="480" y1="144" x2="480" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── 1. Search Agent ─────────────────────────────────────────────────────── -->
  <rect x="310" y="170" width="340" height="95" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="193" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">🔍 Search Agent</text>
  <text x="480" y="212" text-anchor="middle" fill="#2563eb" font-size="10">flight_search → 항공편 조회</text>
  <text x="480" y="228" text-anchor="middle" fill="#3b82f6" font-size="9">memory_set(latest_search, namespace=flights)</text>
  <text x="480" y="243" text-anchor="middle" fill="#60a5fa" font-size="9">notify_console 진행 로그</text>
  <text x="480" y="258" text-anchor="middle" fill="#93c5fd" font-size="8">active_phase = "search"</text>

  <!-- ToolNode for Search -->
  <rect x="730" y="188" width="150" height="62" rx="8" fill="#fefce8" stroke="#d97706" stroke-width="1.5"/>
  <text x="805" y="210" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">🔧 ToolNode</text>
  <text x="805" y="227" text-anchor="middle" fill="#b45309" font-size="9">flight_search · memory_set</text>
  <text x="805" y="242" text-anchor="middle" fill="#d97706" font-size="9">notify_console</text>
  <!-- Arrow Search → ToolNode -->
  <line x1="650" y1="222" x2="728" y2="222" stroke="#d97706" stroke-width="1.5" marker-end="url(#a-y)"/>
  <text x="688" y="215" text-anchor="middle" fill="#d97706" font-size="9">tool 호출</text>
  <!-- Loop back arrow ToolNode → Search -->
  <path d="M805 188 Q 805 148 640 148 Q 560 148 480 170" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a-y)"/>
  <text x="720" y="142" text-anchor="middle" fill="#b45309" font-size="9">결과 반환 후 재실행</text>

  <!-- Arrow Search → PriceAnalysis -->
  <line x1="480" y1="265" x2="480" y2="293" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="500" y="282" fill="#64748b" font-size="9">완료</text>

  <!-- ── 2. Price Analysis Agent ─────────────────────────────────────────────── -->
  <rect x="310" y="293" width="340" height="95" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="480" y="316" text-anchor="middle" fill="#3730a3" font-size="13" font-weight="bold">📊 Price Analysis Agent</text>
  <text x="480" y="335" text-anchor="middle" fill="#4c1d95" font-size="10">memory_get(latest_search) 읽기</text>
  <text x="480" y="351" text-anchor="middle" fill="#6d28d9" font-size="9">LLM 구조화 출력 → PriceDecision</text>
  <text x="480" y="367" text-anchor="middle" fill="#7c3aed" font-size="9">cheapest_price &lt; max_price 여부 판단</text>
  <text x="480" y="382" text-anchor="middle" fill="#a78bfa" font-size="8">도구 호출 없음 — 순수 LLM 추론</text>

  <!-- Arrow PriceAnalysis → Diamond -->
  <line x1="480" y1="388" x2="480" y2="412" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── should_book? diamond ────────────────────────────────────────────────── -->
  <polygon points="480,412 548,445 480,478 412,445" fill="#f8fafc" stroke="#78716c" stroke-width="1.5"/>
  <text x="480" y="442" text-anchor="middle" fill="#292524" font-size="11" font-weight="bold">should_book?</text>
  <text x="480" y="458" text-anchor="middle" fill="#78716c" font-size="8">route_price_analysis</text>

  <!-- ── 3. Booking Agent (YES branch) ──────────────────────────────────────── -->
  <!-- YES arrow Diamond → Booking -->
  <line x1="412" y1="445" x2="332" y2="445" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-g)"/>
  <text x="368" y="438" text-anchor="middle" fill="#15803d" font-size="9" font-weight="bold">YES</text>

  <rect x="110" y="490" width="240" height="95" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <!-- connector from YES line to Booking box -->
  <line x1="230" y1="445" x2="230" y2="488" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-g)"/>
  <text x="230" y="512" text-anchor="middle" fill="#14532d" font-size="13" font-weight="bold">💳 Booking Agent</text>
  <text x="230" y="531" text-anchor="middle" fill="#166534" font-size="10">flight_book → 항공편 예약</text>
  <text x="230" y="547" text-anchor="middle" fill="#16a34a" font-size="9">memory_set(booking_confirmation)</text>
  <text x="230" y="562" text-anchor="middle" fill="#22c55e" font-size="9">notify_console 예약 진행 로그</text>
  <text x="230" y="577" text-anchor="middle" fill="#86efac" font-size="8">active_phase = "booking"</text>

  <!-- ToolNode for Booking (small, left) -->
  <rect x="36" y="508" width="68" height="58" rx="6" fill="#fefce8" stroke="#d97706" stroke-width="1.2"/>
  <text x="70" y="530" text-anchor="middle" fill="#92400e" font-size="9" font-weight="bold">🔧</text>
  <text x="70" y="546" text-anchor="middle" fill="#b45309" font-size="8">ToolNode</text>
  <text x="70" y="560" text-anchor="middle" fill="#d97706" font-size="7">flight_book</text>
  <!-- Arrow Booking → ToolNode -->
  <line x1="110" y1="537" x2="106" y2="537" stroke="#d97706" stroke-width="1.2" marker-end="url(#a-y)"/>
  <!-- Loop back ToolNode → Booking -->
  <path d="M70 508 Q 70 470 110 490" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a-y)"/>

  <!-- extract_booking_result -->
  <rect x="110" y="605" width="240" height="42" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="5,2"/>
  <text x="230" y="622" text-anchor="middle" fill="#14532d" font-size="10" font-weight="bold">📋 extract_booking_result</text>
  <text x="230" y="638" text-anchor="middle" fill="#166534" font-size="9">확인 정보 → FlightState 업데이트</text>
  <line x1="230" y1="585" x2="230" y2="603" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-g)"/>

  <!-- ── 4. Notification Agent (right) ──────────────────────────────────────── -->
  <!-- NO arrow Diamond → Notification -->
  <line x1="548" y1="445" x2="626" y2="445" stroke="#f87171" stroke-width="1.5" marker-end="url(#a-r)"/>
  <text x="586" y="438" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="bold">NO</text>

  <rect x="620" y="490" width="260" height="110" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="2"/>
  <!-- connector from NO line to Notification box -->
  <line x1="750" y1="445" x2="750" y2="488" stroke="#f87171" stroke-width="1.5" marker-end="url(#a-r)"/>
  <text x="750" y="513" text-anchor="middle" fill="#9d174d" font-size="13" font-weight="bold">📣 Notification Agent</text>
  <text x="750" y="532" text-anchor="middle" fill="#be185d" font-size="10">notify_slack(#travel-alerts)</text>
  <text x="750" y="548" text-anchor="middle" fill="#be185d" font-size="10">notify_email(예약 확인 또는 미발견)</text>
  <text x="750" y="564" text-anchor="middle" fill="#db2777" font-size="9">memory_set(notification_sent)</text>
  <text x="750" y="579" text-anchor="middle" fill="#db2777" font-size="9">notify_console 결과 로그</text>
  <text x="750" y="593" text-anchor="middle" fill="#f9a8d4" font-size="8">active_phase = "notification"</text>

  <!-- ToolNode for Notification (small, right) -->
  <rect x="888" y="508" width="56" height="58" rx="6" fill="#fefce8" stroke="#d97706" stroke-width="1.2"/>
  <text x="916" y="530" text-anchor="middle" fill="#92400e" font-size="9" font-weight="bold">🔧</text>
  <text x="916" y="546" text-anchor="middle" fill="#b45309" font-size="8">ToolNode</text>
  <text x="916" y="560" text-anchor="middle" fill="#d97706" font-size="7">notify_*</text>
  <!-- Arrow Notification → ToolNode -->
  <line x1="880" y1="540" x2="886" y2="540" stroke="#d97706" stroke-width="1.2" marker-end="url(#a-y)"/>
  <!-- Loop back ToolNode → Notification -->
  <path d="M916 508 Q 916 468 880 490" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a-y)"/>

  <!-- Booking → Notification (after extract) -->
  <path d="M230 647 Q 230 680 620 640 Q 680 624 680 600" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-g)"/>
  <text x="420" y="686" text-anchor="middle" fill="#15803d" font-size="9">예약 완료 후 알림 전송</text>

  <!-- ── END ────────────────────────────────────────────────────────────────── -->
  <circle cx="750" cy="668" r="28" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="750" y="664" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="bold">END</text>
  <text x="750" y="679" text-anchor="middle" fill="#94a3b8" font-size="9">사이클 완료</text>
  <line x1="750" y1="600" x2="750" y2="638" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── LOOP DECISION ──────────────────────────────────────────────────────── -->
  <rect x="310" y="710" width="360" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="490" y="726" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">LOOP DECISION (run.py)</text>
  <text x="490" y="742" text-anchor="middle" fill="#6b7280" font-size="9">booking_confirmed → 종료  |  check &lt; max_checks → sleep → 다음 사이클</text>
  <!-- END → LOOP DECISION -->
  <path d="M750 696 Q 750 725 670 725" fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- ── Legend ──────────────────────────────────────────────────────────────── -->
  <rect x="16" y="706" width="280" height="58" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="156" y="722" text-anchor="middle" fill="#374151" font-size="9" font-weight="bold">범례 (Legend)</text>
  <line x1="30" y1="738" x2="55" y2="738" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="60" y="742" fill="#374151" font-size="8">LLM ↔ ToolNode 반복 루프</text>
  <line x1="30" y1="755" x2="55" y2="755" stroke="#22c55e" stroke-width="1.5"/>
  <text x="60" y="759" fill="#374151" font-size="8">YES 경로 (예약 조건 충족)</text>
  <line x1="160" y1="755" x2="185" y2="755" stroke="#f87171" stroke-width="1.5"/>
  <text x="190" y="759" fill="#374151" font-size="8">NO 경로 (조건 미충족)</text>
</svg>
